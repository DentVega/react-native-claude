# pnpm v10 movió las settings de package.json#pnpm a este archivo.
# pnpm v11 renombró `onlyBuiltDependencies` a `allowBuilds` y cambió el formato
# de array a mapa `paquete: bool`. Documentado en https://pnpm.io/settings.
#
# Por defecto pnpm bloquea TODOS los postinstall scripts; acá listamos los que sí
# pueden correr. Sin esto: ERR_PNPM_IGNORED_BUILDS al instalar.

allowBuilds:
  unrs-resolver: true
